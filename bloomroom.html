<!DOCTYPE html>
<html lang="en" data-theme="dusk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloom — Your Room</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/room.css">
<link rel="stylesheet" href="css/hotspots.css">
<link rel="stylesheet" href="css/modals.css">

<script>
  // Apply persisted theme before first paint (no flash of the wrong state).
  // ?theme=dusk|day|night previews a state without persisting it.
  (function () {
    var CYCLE_THEMES = ["day", "dusk", "night", "dusk"];
    var VALID = ["dusk", "day", "night"];
    var urlTheme = new URLSearchParams(location.search).get("theme");
    var storedIndex = null, stored = null;
    try {
      storedIndex = localStorage.getItem("bloomroom-lighting-index");
      stored = localStorage.getItem("bloomroom-lighting");
    } catch (e) {}
    var theme;
    if (VALID.indexOf(urlTheme) !== -1) {
      theme = urlTheme;
    } else if (storedIndex !== null) {
      var i = parseInt(storedIndex, 10);
      theme = (i >= 0 && i < CYCLE_THEMES.length) ? CYCLE_THEMES[i] : "dusk";
    } else {
      theme = VALID.indexOf(stored) !== -1 ? stored : "dusk";
    }
    document.documentElement.dataset.theme = theme;
  })();
</script>
</head>
<body>

<div class="scene" id="scene">
  <div class="stage">
    <!-- the three paintings; dusk is the always-present base -->
    <img class="room-art room-dusk"  src="bloomroom-base-v3.png"  alt="" draggable="false">
    <img class="room-art room-day"   src="bloomroom-day-v3.png"   alt="" draggable="false">
    <img class="room-art room-night" src="bloomroom-night-v3.png" alt="" draggable="false">

    <!-- diagonal light beams + contained dust + floor pool -->
    <div class="beam-field">
      <div class="window-glow"></div>
      <div class="beam beam-a"></div>
      <div class="beam beam-b"></div>
      <div class="beam beam-c"></div>
      <div class="light-pool"></div>
      <div class="mote-zone" id="moteZone"></div>
    </div>

    <!-- night bloom: lamp + fairy lights (omnidirectional warmth) -->
    <div class="night-glow" aria-hidden="true">
      <div class="lamp-bloom"></div>
      <div class="lamp-glow-core"></div>
      <div class="lamp-glow-pool"></div>
      <div class="fairy-wash"></div>
      <div class="fairy-band"></div>
      <div class="fairy-band fairy-band-right"></div>
      <!-- bulb centres measured from bloomroom-night-v3.png (left/top = centre) -->
      <div class="fairy-bulb" style="left:11.1%; top:1.3%;"></div>
      <div class="fairy-bulb" style="left:16.0%; top:3.2%; animation-delay:-1.2s;"></div>
      <div class="fairy-bulb" style="left:21.4%; top:4.7%; animation-delay:-2.4s;"></div>
      <div class="fairy-bulb" style="left:37.4%; top:8.9%; animation-delay:-0.6s;"></div>
      <div class="fairy-bulb" style="left:41.4%; top:10.0%; animation-delay:-3.4s;"></div>
      <div class="fairy-bulb" style="left:45.4%; top:8.9%; animation-delay:-1.8s;"></div>
      <div class="fairy-bulb" style="left:48.2%; top:6.8%; animation-delay:-4.2s;"></div>
      <div class="fairy-bulb" style="left:51.3%; top:5.6%; animation-delay:-2.9s;"></div>
      <div class="fairy-bulb" style="left:92.1%; top:1.3%; animation-delay:-0.9s;"></div>
    </div>

    <!-- night dust — separate from screen-blended glow so specks stay visible -->
    <div class="night-motes" aria-hidden="true">
      <div class="night-mote-zone" id="nightMoteZone"></div>
    </div>

    <!-- lamp control (theme cycle) -->
    <button class="lamp-button" id="lampBtn" type="button"
            aria-label="Turn on the lamp for night mode">
      <span class="lamp-hint" aria-hidden="true"></span>
    </button>

    <!-- feature hotspots: invisible buttons sitting on painted objects -->
    <button class="hotspot hotspot-books" type="button"
            data-feature="dashboard" data-hint="Dashboard"
            aria-label="Open your dashboard">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-phone" type="button"
            data-feature="checkin" data-hint="Check-in"
            aria-label="Start today's check-in">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-notebook" type="button"
            data-feature="journal" data-hint="Journal"
            aria-label="Open your journal">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-pot" type="button"
            data-feature="cycle" data-hint="Cycle"
            aria-label="Open cycle tracking">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-armchair" type="button"
            data-feature="insights" data-hint="Insights"
            aria-label="Open your insights">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-cat" type="button"
            data-feature="companion" data-hint="Companion"
            aria-label="Talk to your companion">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-vinyl" type="button"
            data-feature="music" data-hint="Music"
            aria-label="Play some music">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
    <button class="hotspot hotspot-wallart" type="button"
            data-feature="about" data-hint="About Bloom"
            aria-label="About this project">
      <span class="hotspot-hint" aria-hidden="true"></span>
    </button>
  </div>

  <div class="vignette"></div>

  <!-- <button class="toggle" id="toggleBtn">Pause ambient motion</button> -->
</div>

<!-- ================= Feature modals ================= -->

<dialog class="bloom-modal modal-medium" id="modal-dashboard" aria-label="Dashboard">
  <div class="modal-body" id="dashboardBody"></div>
</dialog>

<dialog class="bloom-modal modal-medium" id="modal-checkin" aria-label="Daily check-in">
  <div class="modal-body" id="checkinBody"></div>
</dialog>

<dialog class="bloom-modal modal-wide" id="modal-journal" aria-label="Journal">
  <div class="modal-body" id="journalBody"></div>
</dialog>

<dialog class="bloom-modal modal-medium" id="modal-cycle" aria-label="Cycle tracking">
  <div class="modal-body" id="cycleBody"></div>
</dialog>

<dialog class="bloom-modal modal-wide" id="modal-insights" aria-label="Insights">
  <div class="modal-body" id="insightsBody"></div>
</dialog>

<dialog class="bloom-modal modal-compact" id="modal-companion" aria-label="Companion chat">
  <div class="modal-body" id="companionBody"></div>
</dialog>

<dialog class="bloom-modal modal-compact" id="modal-music" aria-label="Music player">
  <div class="modal-body" id="musicBody"></div>
</dialog>

<dialog class="bloom-modal modal-medium" id="modal-about" aria-label="About Bloom">
  <div class="modal-body" id="aboutBody"></div>
</dialog>

<script src="js/lighting.js"></script>
<script src="js/storage.js"></script>
<script src="js/hotspots.js"></script>
<script src="js/features/dashboard.js"></script>
<script src="js/features/checkin.js"></script>
<script src="js/features/journal.js"></script>
<script src="js/features/cycle.js"></script>
<script src="js/features/insights.js"></script>
<script src="js/features/companion.js"></script>
<script src="js/features/music.js"></script>
<script src="js/features/about.js"></script>

</body>
</html>
